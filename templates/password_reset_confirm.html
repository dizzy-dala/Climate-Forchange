{% extends 'base.html' %}
{% block content %}
<section class="section">
    <div class="form-card card">
        <h2>Create a new password</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Save new password</button>
        </form>
    </div>
</section>
{% endblock %}
