{% extends 'base.html' %}
{% block content %}
<section class="section">
    <div class="form-card card">
        <h2>Create an Account</h2>
        <p>Register to receive personalized alerts and save your profile preferences.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Register</button>
        </form>
    </div>
</section>
{% endblock %}
