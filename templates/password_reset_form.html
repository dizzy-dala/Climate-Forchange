{% extends 'base.html' %}
{% block content %}
<section class="section">
    <div class="form-card card">
        <h2>Reset your password</h2>
        <p>Enter your email address and we will send reset instructions.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Send reset email</button>
        </form>
    </div>
</section>
{% endblock %}
